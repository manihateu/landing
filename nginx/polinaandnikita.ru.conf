# polinaandnikita.ru — HTTP (certbot добавит HTTPS)
#
# Установка на сервере:
#   sudo mkdir -p /var/www/certbot
#   sudo cp nginx/polinaandnikita.ru.conf /etc/nginx/sites-available/polinaandnikita.ru
#   sudo ln -sf /etc/nginx/sites-available/polinaandnikita.ru /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL через certbot:
#   sudo certbot --nginx -d polinaandnikita.ru -d www.polinaandnikita.ru
#
# Docker-приложение слушает 127.0.0.1:11435 (см. docker-compose.yml)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream zagz_app {
    server 127.0.0.1:11435;
    keepalive 32;
}

# www → без www
server {
    listen 80;
    listen [::]:80;
    server_name www.polinaandnikita.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 http://polinaandnikita.ru$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name polinaandnikita.ru;

    # Certbot (webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Статика Next.js — длинный кеш
    location /_next/static/ {
        proxy_pass http://zagz_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://zagz_app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }
}
